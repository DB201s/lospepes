<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pour toi 💗</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow-x: hidden;
  background: transparent;
  color: #fff;
}

body {
  position: relative;
}

.bg {
  position: fixed;
  inset: 0;
  background: url('photo.jpg') center/cover no-repeat;
  filter: blur(8px);
  transform: scale(1.08);
  z-index: -2;
}

.page {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  z-index: 2;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 26px;
  padding: 22px 18px;
  text-align: center;
  backdrop-filter: blur(7px);
  -webkit-backdrop-filter: blur(7px);
  box-shadow: 0 14px 35px rgba(0,0,0,0.18);
  animation: cardFade 0.7s ease;
}

@keyframes cardFade {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 22px;
  line-height: 1.25;
  margin-bottom: 10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.15);
}

.heart {
  font-size: 32px;
  margin-bottom: 16px;
  animation: pulse 1.9s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.reason-box,
.final {
  display: none;
  text-align: left;
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 18px;
  padding: 16px;
  margin-top: 10px;
  line-height: 1.6;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
}

.show {
  display: block;
  animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.reason-number {
  display: inline-block;
  font-size: 28px;
  font-weight: 800;
  color: #ffd1e2;
  margin-right: 8px;
  line-height: 1;
  vertical-align: top;
}

.controls {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.btn {
  flex: 1;
  padding: 13px 14px;
  border: none;
  border-radius: 999px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
}

.btn:active {
  transform: scale(0.97);
}

.btn.primary {
  background: linear-gradient(135deg, #ff5ca0, #ff3f86);
  color: white;
  box-shadow: 0 10px 22px rgba(255,79,147,0.28);
}

.btn.secondary {
  background: rgba(255,255,255,0.22);
  color: white;
}

.btn[disabled] {
  opacity: 0.5;
  cursor: default;
  box-shadow: none;
}

.rain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.emoji {
  position: absolute;
  top: -12vh;
  animation: fall linear forwards;
  user-select: none;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
}

@keyframes fall {
  from { transform: translateY(0) rotate(0deg); }
  to { transform: translateY(120vh) rotate(18deg); }
}

.glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(circle at top, rgba(255,140,190,0.12), transparent 40%);
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="glow"></div>
<div class="rain" id="rain"></div>

<div class="page">
  <div class="card">
    <h1>5 raisons qui te donneront envie que je sois dans ta vie</h1>
    <div class="heart">💗</div>

    <div class="reason-box" id="reasonBox"></div>

    <div class="controls">
      <button class="btn secondary" id="prevBtn" onclick="prevReason()" disabled>Retour</button>
      <button class="btn primary" id="nextBtn" onclick="nextReason()">Commencer 💌</button>
    </div>

    <div class="final" id="finalMessage">
      Passe de bonnes vacances, j’espère te voir à ton retour le plus rapidement possible.<br><br>
      En plus, tu seras toute bronzée… et encore plus belle que tu ne l’es déjà 💋
    </div>
  </div>
</div>

<script>
const reasons = [
  "Je suis un homme très attentionné, avec plein de petites attentions et des gestes simples qui veulent dire beaucoup.",
  "Même si on habite un peu loin, ce n’est pas un problème pour moi. Quand quelqu’un me plaît vraiment, je sais m’investir et faire les choses sérieusement.",
  "Je fais attention aux détails de tout ce que tu me dis, aux choses que tu aimes comme à celles que tu aimes moins.",
  "Je ferai toujours de mon mieux pour que tu ne manques de rien et pour que tu te sentes bien à mes côtés.",
  "Et surtout… on doit fêter nos putains d’anniversaires à l’autre bout du monde, toi et moi."
];

let current = -1;

const reasonBox = document.getElementById('reasonBox');
const finalMessage = document.getElementById('finalMessage');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

function updateButtons() {
  prevBtn.disabled = current <= 0;

  if (current === -1) {
    nextBtn.textContent = 'Commencer 💌';
  } else if (current >= 0 && current < reasons.length - 1) {
    nextBtn.textContent = 'Suivante 💗';
  } else if (current === reasons.length - 1) {
    nextBtn.textContent = 'Lire la fin ✨';
  } else {
    nextBtn.style.display = 'none';
    prevBtn.style.display = 'none';
  }
}

function showReason(index) {
  finalMessage.classList.remove('show');
  finalMessage.style.display = 'none';

  reasonBox.style.display = 'block';
  reasonBox.classList.remove('show');
  void reasonBox.offsetWidth;
  reasonBox.innerHTML = `<span class="reason-number">${index + 1}.</span>${reasons[index]}`;
  reasonBox.classList.add('show');
}

function nextReason() {
  if (current < reasons.length - 1) {
    current++;
    showReason(current);
    updateButtons();
  } else {
    current++;
    reasonBox.classList.remove('show');
    reasonBox.style.display = 'none';

    finalMessage.style.display = 'block';
    finalMessage.classList.remove('show');
    void finalMessage.offsetWidth;
    finalMessage.classList.add('show');

    updateButtons();
  }
}

function prevReason() {
  if (current > 0 && current <= reasons.length - 1) {
    current--;
    showReason(current);
    updateButtons();
  } else if (current === 0) {
    current = -1;
    reasonBox.classList.remove('show');
    reasonBox.style.display = 'none';
    updateButtons();
  } else if (current === reasons.length) {
    current = reasons.length - 1;
    finalMessage.classList.remove('show');
    finalMessage.style.display = 'none';
    showReason(current);
    nextBtn.style.display = 'block';
    prevBtn.style.display = 'block';
    updateButtons();
  }
}

updateButtons();

const rain = document.getElementById('rain');
const emojis = ['🎀','💗','💋'];

function createEmoji() {
  const el = document.createElement('div');
  el.className = 'emoji';
  el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (18 + Math.random() * 15) + 'px';
  el.style.animationDuration = (4 + Math.random() * 3) + 's';
  rain.appendChild(el);
  setTimeout(() => el.remove(), 7000);
}

setInterval(createEmoji, 320);
</script>

</body>
</html>
