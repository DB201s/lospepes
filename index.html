<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pour toi 💗</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('TA_PHOTO_ICI.jpg') center/cover no-repeat;
      filter: blur(12px) brightness(0.6);
      z-index: -1;
    }

    .content {
      position: relative;
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .reasons {
      max-width: 100%;
      margin: auto;
      text-align: left;
      font-size: 15px;
      line-height: 1.6;
      padding: 0 15px;
    }

    button {
      margin: 25px auto 0;
      padding: 14px 25px;
      font-size: 15px;
      border: none;
      border-radius: 40px;
      background: linear-gradient(45deg, #ff4d88, #ff1a66);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
      width: 80%;
      max-width: 280px;
    }

    button:active {
      transform: scale(0.95);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      padding: 0 15px;
      animation: fadeIn 1s ease;
    }

    .emoji {
      position: fixed;
      top: -50px;
      font-size: 22px;
      animation: fall linear infinite;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }

    @media (min-width: 768px) {
      h1 { font-size: 28px; }
      .reasons { font-size: 18px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="content">
    <h1 id="title"></h1>

    <div class="reasons" id="reasons"></div>

    <button onclick="showMessage()">Continuer à lire 💌</button>

    <div class="hidden" id="message">
      <p id="finalText"></p>
    </div>
  </div>

  <script>
    const titleText = "5 raisons qui te donneront envie que je sois dans ta vie 💗";

    const reasonsText = [
      "1. Je suis un homme très attentionné, rempli de petites attentions avec des trucs tout bêtes comme ce genre de texte ahah.",
      "2. Même si on habite un peu loin, c'est pas un problème pour moi, je suis vraiment motivé.",
      "3. Je fais attention aux détails, à ce que tu aimes ou pas.",
      "4. Je ferai tout pour que tu ne manques de rien et que tu sois heureuse.",
      "5. Et surtout… on doit faire nos anniversaires à l'autre bout du monde toi et moi ✈️🌍"
    ];

    const finalMessage = "Passe de bonnes vacances 🌴 J'espère te voir à ton retour le plus rapidement possible. Et tu seras encore plus belle bronzée… même si tu l'es déjà beaucoup 💋";

    function typeWriter(element, text, speed = 35, callback) {
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else if (callback) {
          callback();
        }
      }
      typing();
    }

    function displayReasons(index = 0) {
      if (index >= reasonsText.length) return;

      const container = document.getElementById('reasons');
      const p = document.createElement('p');
      container.appendChild(p);

      typeWriter(p, reasonsText[index], 25, () => {
        displayReasons(index + 1);
      });
    }

    function showMessage() {
      const msg = document.getElementById('message');
      msg.style.display = 'block';
      typeWriter(document.getElementById('finalText'), finalMessage, 25);
    }

    typeWriter(document.getElementById('title'), titleText, 35, () => {
      displayReasons();
    });

    const emojis = ['🎀','💗','💋'];

    function createEmoji() {
      const emoji = document.createElement('div');
      emoji.classList.add('emoji');
      emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.left = Math.random() * 100 + 'vw';
      emoji.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(emoji);

      setTimeout(() => {
        emoji.remove();
      }, 5000);
    }

    setInterval(createEmoji, 180);
  </script>

</body>
</html>
