<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi 💗</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* IMAGE FOND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('photo.jpg') center/cover no-repeat;
  z-index: -1;
}

/* LEGER FILTRE (PAS TROP) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

/* CONTENU */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 90%;
  max-width: 400px;
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: pink;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <div class="card">
    <h2 id="title">5 raisons 💗</h2>

    <p id="text">Clique pour commencer…</p>

    <button onclick="next()">Suivant</button>
  </div>
</div>

<script>
const reasons = [
"Je suis un homme très attentionné",
"Même à distance je suis motivé",
"Je fais attention à chaque détail",
"Je ferai tout pour ton bonheur",
"On doit voyager ensemble ✈️"
];

let i = -1;

function next() {
  i++;

  if(i < reasons.length){
    document.getElementById('text').innerText = reasons[i];
  } else {
    document.getElementById('text').innerText = "Passe de bonnes vacances 💋";
  }
}
</script>

</body>
</html>
